name: Deploy static content to Pages

on:
  push:
    branches: [main, master, claude-opus-4-8-1781034975013]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Copy data
        run: |
          echo "Copying data files"
          mkdir -p ./public/data
          cp ./web/data/painel_data.js ./public/data/
          cp ./web/index.html ./public/
          cp -r ./web/data/*.json ./public/data/ 2>/dev/null || true
      - name: Set base path
        run: |
          sed -i 's|"\./|"/enem-dashboard/|g' ./public/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
